version: "3.9"

services:

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: audio_diarization
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  api:
    build: .
    restart: always
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - uploads_data:/app/uploads

  worker:
    build: .
    command: celery -A app.tasks worker --loglevel=info --concurrency=2
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - uploads_data:/app/uploads

volumes:
  mysql_data:
  uploads_data: